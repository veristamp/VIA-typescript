services:
  postgres:
    image: postgres:16-alpine
    container_name: via-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=via_registry
      - POSTGRES_USER=via
      - POSTGRES_PASSWORD=via
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U via -d via_registry"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: via-qdrant
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:6333/readyz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
